apiVersion: apps/v1
kind: Deployment
metadata:
  name: writeservice
  namespace: bitly
spec:
  template:
    spec:
      containers:
      - name: writeservice
        imagePullPolicy: Never
        env:
        - name: ConnectionStrings__DefaultConnection
          value: Host=postgres;Database=urlshortener;Username=postgres;Password=password
        - name: Redis__CounterConnectionString
          value: redis:6379
        - name: Redis__CacheConnectionString
          value: redis-cache:6379
---
apiVersion: v1
kind: Service
metadata:
  name: writeservice
  namespace: bitly
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
