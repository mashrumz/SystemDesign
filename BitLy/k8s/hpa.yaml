apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: writeservice
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: writeservice
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: readservice
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: readservice
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
