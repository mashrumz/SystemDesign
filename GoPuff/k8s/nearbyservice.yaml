apiVersion: apps/v1
kind: Deployment
metadata:
  name: nearbyservice
  namespace: gopuff
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nearbyservice
  template:
    metadata:
      labels:
        app: nearbyservice
    spec:
      containers:
      - name: nearbyservice
        image: gopuff-nearbyservice:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        env:
        - name: ASPNETCORE_URLS
          value: "http://+:80"
        - name: ConnectionStrings__DefaultConnection
          value: "Host=postgres;Database=gopuff;Username=postgres;Password=password"
        - name: Redis__FcCacheConnectionString
          value: "redis-fc:6379"
        readinessProbe:
          httpGet:
            path: /nearby?lat=40.75&lon=-73.99&radiusMiles=30
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nearbyservice
  namespace: gopuff
spec:
  selector:
    app: nearbyservice
  ports:
    - port: 80
