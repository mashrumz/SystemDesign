apiVersion: apps/v1
kind: Deployment
metadata:
  name: availabilityservice
  namespace: gopuff
spec:
  replicas: 2
  selector:
    matchLabels:
      app: availabilityservice
  template:
    metadata:
      labels:
        app: availabilityservice
    spec:
      containers:
      - name: availabilityservice
        image: gopuff-availabilityservice:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        env:
        - name: ASPNETCORE_URLS
          value: "http://+:80"
        - name: ConnectionStrings__DefaultConnection
          value: "Host=postgres;Database=gopuff;Username=postgres;Password=password"
        - name: Redis__InvCacheConnectionString
          value: "redis-inv:6379"
        - name: Services__NearbyServiceUrl
          value: "http://nearbyservice:80"
---
apiVersion: v1
kind: Service
metadata:
  name: availabilityservice
  namespace: gopuff
spec:
  selector:
    app: availabilityservice
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30180
